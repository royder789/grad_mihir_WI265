<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan EMI Calculator - OUR BANK</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            max-width: 550px;
            margin: 2rem auto;
        }
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #e6f3ff;
            border-radius: 10px;
            font-size: 1.4rem;
            text-align: center;
            color: #004b8d;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">OUR BANK</div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="services.html">SERVICES</a>
            <a href="netbanking.html">NETBANKING</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>
</header>

<main>
    <section class="container">
        <h2>Loan EMI Calculator</h2>
        <form>
            <label>Applicant Name</label>
            <input type="text" id="name" required>

            <label>Loan Type</label>
            <select id="type" required>
                <option value="">Select Loan Type</option>
                <option value="HOME">Home Loan</option>
                <option value="CAR">Car Loan</option>
                <option value="PERSONAL">Personal Loan</option>
            </select>

            <label>Loan Amount (₹)</label>
            <input type="number" id="amount" min="1" required>

            <label>Duration (Years)</label>
            <input type="number" id="duration" min="1" required>

            <button type="button" onclick="calculate()">Calculate EMI</button>
        </form>

        <div class="error" id="error" style="color:red; text-align:center; margin-top:1rem; font-weight:bold;"></div>
        <div class="result" id="result"></div>
    </section>
</main>

<footer>
    <p>&copy; 2026 OUR BANK. All Rights Reserved.</p>
</footer>

<script>
function calculate(){
    let name = document.getElementById("name").value.trim();
    let type = document.getElementById("type").value;
    let amount = parseFloat(document.getElementById("amount").value);
    let duration = parseFloat(document.getElementById("duration").value);
    let error = document.getElementById("error");
    let result = document.getElementById("result");

    error.innerHTML = "";
    result.innerHTML = "";

    if(!name || !type || isNaN(amount) || isNaN(duration) || amount <= 0 || duration <= 0){
        error.innerHTML = "Please fill all fields correctly with valid values.";
        return;
    }

    let interest;
    let maxAmount, maxYears;

    if(type === "HOME"){
        maxAmount = 500000; maxYears = 30; interest = 9;
    } else if(type === "CAR"){
        maxAmount = 100000; maxYears = 7; interest = 12;
    } else if(type === "PERSONAL"){
        maxAmount = 10000; maxYears = 5; interest = 15;
    }

    if(amount > maxAmount || duration > maxYears){
        error.innerHTML = `${type} Loan: Maximum ₹${maxAmount.toLocaleString()} and ${maxYears} years allowed.`;
        return;
    }

    let r = interest / (12 * 100);
    let n = duration * 12;
    let emi = (amount * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

    result.innerHTML = `Monthly EMI for ${type} Loan: <strong>₹${emi.toFixed(2)}</strong>`;
}
</script>

</body>
</html>
