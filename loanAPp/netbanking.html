<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netbanking - OUR BANK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">OUR BANK</div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="services.html">SERVICES</a>
            <a href="netbanking.html">NETBANKING</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>
</header>

<main>
    <section>
        <h2>Netbanking Login</h2>
        <form>
            <label>Customer ID / Username</label>
            <input type="text" placeholder="Enter your Customer ID" required>

            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>

            <button type="submit">LOGIN</button>
        </form>

        <p style="text-align:center; margin:2rem 0;">New Customer? <a href="#signup" style="color:#0066cc;">Sign Up now</a></p>

        <hr style="margin:3rem 0;">

        <h2>Create Netbanking Account</h2>
        <form id="signup">
            <label>Full Name</label>
            <input type="text" required>

            <label>Account Number</label>
            <input type="text" required>

            <label>Mobile Number</label>
            <input type="tel" required>

            <label>Set Password</label>
            <input type="password" required>

            <button type="submit">SIGN UP</button>
        </form>
    </section>
</main>
